<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1013">
<link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
<link rel="icon" href="/icon.png">
<title>Hogar</title>
<style>
  :root{
    --bg:#0e1013;--bg-raised:#171a20;--fg:#e8eaed;--muted:#8b919c;--border:#272c35;
    --accent:#7aa2ff;--ok:#4ade80;--warn:#fbbf24;--err:#f87171;
    --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  body{font-family:var(--font-ui);background:var(--bg);color:var(--fg);margin:0;padding:18px 16px calc(28px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;}
  nav{display:flex;gap:8px;margin-bottom:12px;}
  nav a{color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;padding:0 14px;min-height:44px;display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:999px;white-space:nowrap;}
  nav a:active{border-color:var(--accent);color:var(--accent);}
  nav a.on{color:var(--fg);border-color:var(--accent);background:rgba(122,162,255,.12);}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px;}
  .card{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:14px;}
  .card h2{font-size:14px;margin:2px 0 4px;display:flex;align-items:center;gap:8px;font-weight:600;}
  .count{color:var(--muted);font-weight:400;font-size:12px;margin-left:auto;}
  .row{padding:7px 0;border-top:1px solid var(--border);display:flex;gap:12px;align-items:center;}
  .title{flex:1;line-height:1.35;}
  .rec{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:1px 7px;margin-left:7px;white-space:nowrap;}
  .meta{color:var(--muted);font-size:12px;text-align:right;line-height:1.4;}
  button.done{flex:0 0 auto;width:44px;height:44px;border-radius:999px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:16px;line-height:1;cursor:pointer;padding:0;}
  button.done:active{border-color:var(--accent);color:var(--accent);}
  button.done:disabled{opacity:.6;}
  .row.completed .title{text-decoration:line-through;color:var(--muted);}
  .row.completed .meta{color:var(--muted);}
  .row.completed button.done{border-color:var(--ok);color:var(--ok);}
  .attention{border-color:var(--warn);}
  .attention h2{color:var(--warn);}
  .warn{color:var(--warn);font-weight:600;}
  .err{color:var(--err);font-weight:600;}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:22px 0;}
  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:14px;line-height:1.5;}
  .toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--fg);color:var(--bg);padding:8px 16px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:.95;}
</style>
</head>
<body>
<div class="wrap">
  <nav><a href="/">⌂</a><a class="on" href="/dashboard.html">🏠 Hogar</a><a href="/apartments.html">🏢 Apartamentos</a></nav>
  <div class="sub">Actualizado {{UPDATED}}</div>
  {{SECTIONS}}
  <div class="foot">Toca ✓ para completar — el grupo de Telegram recibe aviso (excepto mercado).<br>Para anotar cosas nuevas, escribe al grupo.</div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(t){var el=document.getElementById("toast");el.textContent=t;el.classList.add("show");setTimeout(function(){el.classList.remove("show");},1800);}
document.addEventListener("click",function(e){
  var el=e.target;if(!el.classList||!el.classList.contains("done"))return;
  var id=Number(el.getAttribute("data-id"));
  var row=document.getElementById("it"+id);
  // an accidental tap on a monthly bill silently rolls its due date a month — confirm just those
  if(row&&row.querySelector(".rec")){
    var t=row.querySelector(".title").firstChild.textContent.trim();
    if(!confirm("¿Marcar \""+t+"\" como pagado? La fecha pasa al próximo mes."))return;
  }
  el.disabled=true;
  fetch("items-action",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:"complete",id:id})})
    .then(function(r){return r.json();})
    .then(function(res){
      if(!res||!res.ok){el.disabled=false;toast("Error al guardar");return;}
      if(row){row.classList.add("completed");
        if(res.next){var m=row.querySelector(".meta");if(m){m.textContent="próx: "+res.next;m.className="meta";}}}
      toast(res.next?"✓ · próx "+res.next:"✓ Hecho");
    })
    .catch(function(){el.disabled=false;toast("Error de red");});
});
// reload on focus regain, but only if it's been a while and we're online —
// an unconditional reload flashes, loses scroll, and offline replaces the page with a browser error
// seed with load time so a page that loaded while hidden doesn't force-reload the instant it's first shown
var hiddenAt=Date.now();
document.addEventListener("visibilitychange",function(){
  if(document.hidden){hiddenAt=Date.now();return;}
  if(navigator.onLine!==false&&Date.now()-hiddenAt>60000)location.reload();
});
</script>
</body>
</html>
