<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="60">
<title>Household</title>
<style>
  :root{
    --bg:#0e1013;--bg-raised:#171a20;--fg:#e8eaed;--muted:#8b919c;--border:#272c35;
    --accent:#7aa2ff;--ok:#4ade80;--warn:#fbbf24;--err:#f87171;
    --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  body{font-family:var(--font-ui);background:var(--bg);color:var(--fg);margin:0;padding:18px 16px 28px;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;}
  h1{font-size:21px;margin:0 0 2px;letter-spacing:-.01em;}
  .sub{color:var(--muted);font-size:13px;margin-bottom:18px;}
  .card{background:var(--bg-raised);border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:14px;}
  .card h2{font-size:14px;margin:2px 0 4px;display:flex;align-items:center;gap:8px;font-weight:600;}
  .count{color:var(--muted);font-weight:400;font-size:12px;margin-left:auto;}
  .row{padding:9px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:14px;align-items:baseline;}
  .title{flex:1;line-height:1.35;}
  .rec{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:1px 7px;margin-left:7px;white-space:nowrap;}
  .meta{color:var(--muted);font-size:12px;white-space:nowrap;text-align:right;}
  .attention{border-color:var(--warn);}
  .attention h2{color:var(--warn);}
  .warn{color:var(--warn);font-weight:600;}
  .err{color:var(--err);font-weight:600;}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:22px 0;}
  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:14px;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🏠 Household</h1>
  <div class="sub">Read-only overview · updated {{UPDATED}}</div>
  {{SECTIONS}}
  <div class="foot">Refreshes automatically every minute.<br>Add or complete items by messaging the Telegram group.</div>
</div>
</body>
</html>
